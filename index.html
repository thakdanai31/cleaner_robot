<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cyber-Cleaner Pro - AI Powered Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap");

      body {
        margin: 0;
        background: #0a0c10;
        font-family: "Kanit", sans-serif;
        overflow: hidden;
        color: #fff;
        touch-action: none;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      /* --- Header UI --- */
      #header {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(15, 20, 25, 0.85);
        backdrop-filter: blur(10px);
        padding: 15px 25px;
        border-radius: 12px;
        border: 1px solid #333;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        z-index: 100;
        pointer-events: none;
      }
      #header h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
        color: #00d2d3;
        letter-spacing: 1px;
      }
      #header p {
        margin: 5px 0 0 0;
        font-size: 13px;
        color: #aaa;
      }
      .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: #2ed573;
        border-radius: 50%;
        box-shadow: 0 0 8px #2ed573;
        margin-right: 8px;
      }

      /* --- แผงควบคุม AI Smart Cleaning --- */
      #ai-smart-panel {
        position: absolute;
        top: 110px;
        left: 20px;
        background: rgba(15, 20, 25, 0.85);
        backdrop-filter: blur(10px);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #6c5ce7;
        box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        z-index: 100;
        width: 260px;
      }
      #ai-smart-panel h3 {
        margin: 0 0 10px 0;
        font-size: 15px;
        color: #a29bfe;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .ai-input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #444;
        background: #111;
        color: #fff;
        font-family: "Kanit", sans-serif;
        margin-bottom: 10px;
        font-size: 13px;
      }
      .ai-input:focus {
        outline: none;
        border-color: #6c5ce7;
      }
      .api-key-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .btn-api-key {
        width: auto;
        flex: 1;
        padding: 9px 12px;
        font-size: 12px;
      }
      .btn-api-key.secondary {
        background: #2f3542;
      }
      .api-key-status {
        font-size: 11px;
        color: #b2bec3;
        line-height: 1.4;
        margin: 0 0 10px 0;
      }
      .api-key-status.ready {
        color: #2ed573;
      }

      /* --- แถบเครื่องมือ (Toolbar) --- */
      #toolbar {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 25, 30, 0.9);
        padding: 12px 20px;
        border-radius: 30px;
        display: flex;
        gap: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border: 1px solid #444;
        z-index: 100;
        backdrop-filter: blur(10px);
        flex-wrap: wrap;
        justify-content: center;
        width: max-content;
        max-width: 90vw;
      }

      .btn-tool {
        border: none;
        border-radius: 20px;
        padding: 10px 18px;
        font-family: "Kanit", sans-serif;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
        background: #2f3542;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-tool:hover {
        background: #57606f;
      }
      .btn-tool:active {
        transform: scale(0.95);
      }
      .btn-tool.active {
        background: #00d2d3;
        color: #111;
        font-weight: 800;
        box-shadow: 0 0 15px rgba(0, 210, 211, 0.4);
      }
      #btn-power {
        background: #ff4757;
        color: white;
      }
      #btn-power.active {
        background: #2ed573;
        box-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
      }
      #btn-bottom {
        background: #f0932b;
        color: white;
      }

      /* --- ป้ายกำกับ HTML A-M แบบติดผิว (Snapped Labels) --- */
      #labels-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
      }

      .floating-label {
        position: absolute;
        color: white;
        font-weight: 800;
        font-size: 13px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.9);
        transform: translate(-50%, -50%);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        cursor: pointer;
      }
      .floating-label:hover {
        transform: translate(-50%, -50%) scale(1.2);
        border-color: #fff;
        z-index: 60;
      }

      /* --- หน้าต่าง Pop-up (Modal) --- */
      #info-modal {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #info-modal.show {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: #1e242b;
        border: 1px solid #444;
        border-radius: 16px;
        width: 90%;
        max-width: 450px;
        padding: 25px;
        box-sizing: border-box; /* แก้ปัญหา Scrollbar แนวนอนล้นขอบ */
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        transform: translateY(20px);
        transition: transform 0.3s ease;
        position: relative;
        max-height: 80vh;
        overflow-y: auto;
        overflow-x: hidden; /* ซ่อน Scrollbar แนวนอนอย่างเด็ดขาด */
      }
      #info-modal.show .modal-content {
        transform: translateY(0);
      }
      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #ff4757;
        border: none;
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      .modal-close:hover {
        background: #ff6b81;
        transform: scale(1.1);
      }
      .modal-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 15px;
      }
      #modal-badge {
        width: 45px;
        height: 45px;
        border-radius: 10px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 800;
        border: 2px solid rgba(255, 255, 255, 0.5);
        flex-shrink: 0;
      }
      #modal-title {
        margin: 0;
        font-size: 18px;
        color: #00d2d3;
      }
      #modal-desc {
        margin: 0;
        font-size: 14px;
        color: #ccc;
        line-height: 1.6;
      }

      /* --- รูปภาพใน Modal --- */
      #modal-image {
        width: 100%;
        height: 180px;
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 15px;
        border: 1px solid #444;
        display: none;
        background-color: #0a0c10;
      }

      /* --- ส่วนของ AI --- */
      .ai-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px dashed #444;
      }
      .btn-ai {
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-family: "Kanit", sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.2s;
      }
      .btn-ai:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(108, 92, 231, 0.4);
      }
      .btn-ai:active {
        transform: translateY(0);
      }
      .btn-ai:disabled {
        filter: grayscale(1);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .ai-response {
        margin-top: 15px;
        background: rgba(108, 92, 231, 0.1);
        border-left: 4px solid #6c5ce7;
        padding: 12px 15px;
        border-radius: 0 8px 8px 0;
        font-size: 13.5px;
        color: #dfe6e9;
        line-height: 1.5;
        display: none;
      }

      .loader {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top: 3px solid #fff;
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
        display: none;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* ==========================================
           Responsive Design (รองรับหน้าจอมือถือ/แท็บเล็ต)
           ========================================== */
      @media (max-width: 768px) {
        /* ย่อส่วน Header */
        #header {
          top: 10px;
          left: 10px;
          padding: 10px 15px;
        }
        #header h1 {
          font-size: 18px;
        }
        #header p {
          font-size: 11px;
        }

        /* ย่อส่วนแผงควบคุม AI ให้ไม่บังจอ */
        #ai-smart-panel {
          top: 80px;
          left: 10px;
          width: calc(100% - 20px);
          max-width: 320px;
          padding: 12px;
        }

        /* ย่อปุ่มเครื่องมือด้านล่าง */
        #toolbar {
          bottom: 15px;
          padding: 8px 12px;
          gap: 6px;
          width: 95vw;
          border-radius: 20px;
        }
        .btn-tool {
          padding: 8px 12px;
          font-size: 11px;
          border-radius: 15px;
        }

        /* ปรับขนาด Pop-up ให้อ่านง่ายบนมือถือ */
        .modal-content {
          padding: 15px;
          max-height: 85vh;
        }
        .modal-header {
          margin-bottom: 10px;
          padding-bottom: 10px;
          gap: 10px;
        }
        #modal-badge {
          width: 35px;
          height: 35px;
          font-size: 18px;
        }
        #modal-title {
          font-size: 16px;
        }
        #modal-image {
          height: 120px;
          margin-bottom: 10px;
        }
        #modal-desc {
          font-size: 13px;
        }
        .btn-ai {
          font-size: 13px;
          padding: 8px 12px;
        }

        /* ย่อป้ายตัวอักษร 3D */
        .floating-label {
          width: 24px;
          height: 24px;
          font-size: 11px;
          border-width: 1px;
        }
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h1>CYBER-CLEANER PRO</h1>
      <p><span class="status-dot"></span>GEMINI AI ASSISTANT ONLINE ✨</p>
    </div>

    <!-- แผงควบคุม AI Smart Cleaning Mode -->
    <div id="ai-smart-panel">
      <h3>✨ AI Smart Cleaning</h3>
      <p
        style="
          font-size: 11px;
          color: #aaa;
          margin: 0 0 10px 0;
          line-height: 1.4;
        "
      >
        ให้ AI ปรับจูนความเร็วพัดลม (Blower) และระบบพ่นน้ำตามสถานการณ์จริง
      </p>
      <input
        type="password"
        id="gemini-api-key"
        class="ai-input"
        placeholder="วาง Gemini API Key ที่นี่"
        autocomplete="off"
      />
      <div class="api-key-actions">
        <button id="btn-save-api-key" class="btn-ai btn-api-key">
          บันทึก API Key
        </button>
        <button id="btn-clear-api-key" class="btn-ai btn-api-key secondary">
          ล้าง
        </button>
      </div>
      <p id="api-key-status" class="api-key-status">
        ยังไม่ได้ตั้งค่า Gemini API Key
      </p>
      <input
        type="text"
        id="ai-mess-input"
        class="ai-input"
        placeholder="เช่น หกน้ำผลไม้และมีเศษขนมปัง..."
      />
      <button id="btn-ai-optimize" class="btn-ai">
        ✨ ปรับตั้งค่าอัตโนมัติ
      </button>
      <div id="ai-smart-loader" class="loader" style="margin: 10px auto"></div>
      <div id="ai-smart-result" class="ai-response"></div>
    </div>

    <div id="labels-container"></div>
    <div id="canvas-container"></div>

    <div id="toolbar">
      <button id="btn-power" class="btn-tool active">⚡ Power (ON)</button>
      <button id="btn-cover" class="btn-tool">🛸 สลับโหมด X-Ray</button>
      <button id="btn-labels" class="btn-tool active">🔤 ซ่อน/แสดงป้าย</button>
      <button id="btn-bottom" class="btn-tool">🔍 ดูใต้ท้องเครื่อง</button>
    </div>

    <!-- Pop-up Modal -->
    <div id="info-modal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-header">
          <div id="modal-badge">A</div>
          <h2 id="modal-title">Title Here</h2>
        </div>

        <!-- เพิ่มรูปภาพประกอบชิ้นส่วน -->
        <img id="modal-image" src="" alt="Component Image" />

        <p id="modal-desc">Description goes here.</p>

        <!-- Gemini AI Section (Part Explainer) -->
        <div class="ai-section">
          <button id="btn-ask-ai" class="btn-ai">
            ✨ ถอดรหัสชิ้นส่วนนี้ด้วย AI
            <div class="loader" id="ai-loader"></div>
          </button>
          <div id="ai-response" class="ai-response"></div>
        </div>
      </div>
    </div>

    <script>
      // ==========================================
      // Gemini API Configuration
      // ==========================================
      const GEMINI_API_KEY_STORAGE = "cleaner-robot-gemini-api-key";
      const GEMINI_MODEL = "gemini-2.5-flash";
      let apiKey = localStorage.getItem(GEMINI_API_KEY_STORAGE) || "";
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      const apiKeyInput = document.getElementById("gemini-api-key");
      const btnSaveApiKey = document.getElementById("btn-save-api-key");
      const btnClearApiKey = document.getElementById("btn-clear-api-key");
      const apiKeyStatus = document.getElementById("api-key-status");

      function syncApiKeyFromInput() {
        apiKey = apiKeyInput.value.trim();
        updateApiKeyStatus();
        return apiKey;
      }

      function updateApiKeyStatus() {
        const hasApiKey = Boolean(apiKey.trim());
        apiKeyStatus.textContent = hasApiKey
          ? "พร้อมใช้งาน Gemini API Key แล้ว"
          : "ยังไม่ได้ตั้งค่า Gemini API Key";
        apiKeyStatus.classList.toggle("ready", hasApiKey);
      }

      function saveApiKey() {
        const nextApiKey = syncApiKeyFromInput();
        if (nextApiKey) {
          localStorage.setItem(GEMINI_API_KEY_STORAGE, nextApiKey);
        } else {
          localStorage.removeItem(GEMINI_API_KEY_STORAGE);
        }
        updateApiKeyStatus();
      }

      function clearApiKey() {
        apiKey = "";
        apiKeyInput.value = "";
        localStorage.removeItem(GEMINI_API_KEY_STORAGE);
        updateApiKeyStatus();
      }

      apiKeyInput.value = apiKey;
      updateApiKeyStatus();
      btnSaveApiKey.addEventListener("click", saveApiKey);
      btnClearApiKey.addEventListener("click", clearApiKey);
      apiKeyInput.addEventListener("input", syncApiKeyFromInput);
      apiKeyInput.addEventListener("change", saveApiKey);

      function escapeHtml(value) {
        return String(value ?? "").replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[char],
        );
      }

      function formatErrorMessage(error, fallbackMessage) {
        if (error instanceof Error && error.message) {
          return error.message;
        }
        return fallbackMessage;
      }

      function getGeminiErrorMessage(data, response) {
        const apiMessage = data?.error?.message;
        if (typeof apiMessage === "string" && apiMessage.trim()) {
          return apiMessage.trim();
        }

        const blockReason =
          data?.promptFeedback?.blockReason ||
          data?.candidates?.[0]?.finishReason;
        if (typeof blockReason === "string" && blockReason.trim()) {
          return `API ไม่ส่งเนื้อหากลับมา (${blockReason.trim()})`;
        }

        return `HTTP ${response.status} ${response.statusText}`.trim();
      }

      function extractGeminiText(data) {
        const parts = data?.candidates?.flatMap(
          (candidate) => candidate?.content?.parts || [],
        );

        const text = (parts || [])
          .map((part) => (typeof part?.text === "string" ? part.text : ""))
          .join("")
          .trim();

        if (text) return text;

        const fallbackText = data?.text;
        if (typeof fallbackText === "string" && fallbackText.trim()) {
          return fallbackText.trim();
        }

        throw new Error("API ตอบกลับมา แต่ไม่พบข้อความใน response");
      }

      function extractGeminiJSON(data) {
        const text = extractGeminiText(data);

        try {
          return JSON.parse(text);
        } catch (parseError) {
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            return JSON.parse(jsonMatch[0]);
          }

          throw new Error(
            `API ตอบกลับมา แต่ JSON ไม่ถูกต้อง: ${parseError.message}`,
          );
        }
      }

      function normalizeCleaningSettings(data) {
        const blowerSpeed = Number(data?.blowerSpeed);
        const brushSpeed = Number(data?.brushSpeed);
        const waterPump =
          typeof data?.waterPump === "string"
            ? data.waterPump.toLowerCase() === "true"
            : Boolean(data?.waterPump);
        const explanation = String(data?.explanation ?? "").trim();

        if (!Number.isFinite(blowerSpeed)) {
          throw new Error("API ตอบกลับมา แต่ไม่มีค่า blowerSpeed ที่ใช้งานได้");
        }

        if (!Number.isFinite(brushSpeed)) {
          throw new Error("API ตอบกลับมา แต่ไม่มีค่า brushSpeed ที่ใช้งานได้");
        }

        if (!explanation) {
          throw new Error("API ตอบกลับมา แต่ไม่มีคำอธิบาย explanation");
        }

        return {
          blowerSpeed,
          brushSpeed,
          waterPump,
          explanation,
        };
      }

      async function callGeminiAPI(payload, retries = 5) {
        syncApiKeyFromInput();
        if (!apiKey.trim()) {
          throw new Error("ยังไม่ได้ตั้งค่า Gemini API Key");
        }

        const delays = [1000, 2000, 4000, 8000, 16000];
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;

        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const rawText = await response.text();
            const data = rawText ? JSON.parse(rawText) : {};

            if (!response.ok || data?.error) {
              throw new Error(getGeminiErrorMessage(data, response));
            }

            return data;
          } catch (error) {
            if (i === retries - 1) throw error;
            await sleep(delays[i]);
          }
        }
      }

      async function fetchGeminiText(prompt, retries = 5) {
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: {
            parts: [
              {
                text: "คุณคือ AI วิศวกรผู้เชี่ยวชาญด้านหุ่นยนต์ทำความสะอาด อธิบายหน้าที่และวิธีบำรุงรักษาอุปกรณ์ตามที่ผู้ใช้ถาม ตอบเป็นภาษาไทย สั้น กระชับ เข้าใจง่าย ภายใน 3-4 ประโยค",
              },
            ],
          },
        };
        const data = await callGeminiAPI(payload, retries);
        return extractGeminiText(data);
      }

      async function fetchGeminiJSON(prompt, retries = 5) {
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: {
            parts: [
              {

          id: "H",
          title: "Mist Spray Nozzles",
          desc: "หัวฉีดทองเหลือง 3 จุด พ่นละอองน้ำฝอยละเอียด (Mist Spray) ลงบนผ้าม็อบ",
          bg: "rgba(0, 210, 211, 0.85)",
          pos: [0, -1.0, -4.0],
          img: "https://5.imimg.com/data5/SELLER/Default/2021/7/BH/KQ/XC/41969394/mist-nozzle-korean-500x500.jpg",
        },
        {
          id: "I",
          title: "Drive Wheels",
          desc: "ระบบขับเคลื่อน 2 ล้อยางหลัก ผสานกับล้อประคอง 3 จุด",
          bg: "rgba(30, 30, 30, 0.85)",
          pos: [-6.8, 0.2, -1],
          img: "https://rotontek.com/wp-content/uploads/2023/12/image-36.png",
        },
        {
          id: "J",
          title: "Dual Brushes",
          desc: "แปรงปัดฝุ่นคู่หน้า หมุนกวาดเศษฝุ่นเข้าสู่จุดศูนย์กลางใต้ท้องเครื่อง",
          bg: "rgba(120, 120, 120, 0.85)",
          pos: [-4.0, -1.0, 4.5],
          img: "https://down-th.img.susercontent.com/file/sg-11134201-22120-1pdeqdor1nlvee",
        },
        {
          id: "K",
          title: "Dust Intake",
          desc: "ช่องทางเข้าของฝุ่น เชื่อมต่อโดยตรงกับพัดลมดูดฝุ่น",
          bg: "rgba(40, 40, 40, 0.85)",
          pos: [0, -0.8, 3.0],
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyERQpMlgxBV6jIiYSdBtVO9mBys_MO7Ex0g&s",
        },
        {
          id: "M",
          title: "Motor Driver",
          desc: "ทำหน้าที่ควบคุมแรงของล้อขับเคลื่อนหุ่นยนต์ รับคำสั่งจากสมองกลเพื่อสั่งการเคลื่อนที่เดินหน้าและถอยหลัง",
          bg: "rgba(39, 174, 96, 0.85)",
          pos: [-3.5, 1.5, -0.2],
          img: "https://lh5.googleusercontent.com/proxy/Hr0wuWBrQx1_Vd7yamqRxP4slOGTYY4URub8muQXRZj_CjipxlOJfQGdc9CB1JIPNaKyt-qsw57-oYWLHE-7X2vx8OEc4o8uvLPJszqn4tI",
        },
      ];

      const labelsContainer = document.getElementById("labels-container");
      const labelElements = [];
      const modal = document.getElementById("info-modal");
      const modalBadge = document.getElementById("modal-badge");
      const modalTitle = document.getElementById("modal-title");
      const modalDesc = document.getElementById("modal-desc");
      const modalImage = document.getElementById("modal-image");

      const btnAskAI = document.getElementById("btn-ask-ai");
      const aiResponseDiv = document.getElementById("ai-response");
      const aiLoader = document.getElementById("ai-loader");
      let currentComponent = "";

      function openModal(data) {
        currentComponent = data.title;
        modalBadge.textContent = data.id;
        modalBadge.style.background = data.bg;
        modalTitle.textContent = data.title;
        modalDesc.textContent = data.desc;

        if (data.img) {
          modalImage.src = data.img;
          modalImage.style.display = "block";
          // ระบบ Fallback เผื่อบางลิงก์ถูกบล็อก (CORS) จะสลับมาโชว์ข้อความแทน
          modalImage.onerror = function () {
            this.onerror = null;
            const encodedTitle = encodeURIComponent(data.title);
            this.src = `https://placehold.co/600x300/1e242b/00d2d3/png?text=${encodedTitle}`;
          };
        } else {
          modalImage.style.display = "none";
        }

        aiResponseDiv.style.display = "none";
        aiResponseDiv.innerHTML = "";
        btnAskAI.style.display = "flex";
        aiLoader.style.display = "none";
        modal.classList.add("show");
      }

      window.closeModal = function () {
        modal.classList.remove("show");
      };
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      btnAskAI.addEventListener("click", async () => {
        btnAskAI.disabled = true;
        aiLoader.style.display = "block";
        try {
          const aiResult = await fetchGeminiText(
            `อธิบายการทำงานและวิธีบำรุงรักษา ${currentComponent} ของหุ่นยนต์ดูดฝุ่น`,
          );
          aiResponseDiv.innerHTML = `<strong>✨ AI แนะนำ:</strong><br>${aiResult.replace(/\n/g, "<br>")}`;
          const safeAiResult = escapeHtml(aiResult).replace(/\n/g, "<br>");
          aiResponseDiv.innerHTML = aiResponseDiv.innerHTML.replace(
            aiResult.replace(/\n/g, "<br>"),
            safeAiResult,
          );
          aiResponseDiv.style.display = "block";
          btnAskAI.style.display = "none";
        } catch (error) {
          aiResponseDiv.innerHTML =
            "<i>⚠️ ระบบ AI ไม่พร้อมใช้งาน กรุณาลองใหม่</i>";
          aiResponseDiv.style.display = "block";
        } finally {
          btnAskAI.disabled = false;
          aiLoader.style.display = "none";
        }
      });

      labelsData.forEach((data) => {
        const el = document.createElement("div");
        el.className = "floating-label";
        el.style.background = data.bg;
        el.textContent = data.id;
        el.addEventListener("click", () => openModal(data));
        labelsContainer.appendChild(el);
        labelElements.push({
          element: el,
          pos3D: new THREE.Vector3(...data.pos),
        });
      });

      function updateLabels() {
        if (labelsContainer.style.display === "none") return;
        const tempV = new THREE.Vector3();
        labelElements.forEach((label) => {
          tempV.copy(label.pos3D);
          tempV.applyMatrix4(robot.matrixWorld);
          tempV.project(camera);
          const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
          const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
          if (tempV.z > 1) label.element.style.display = "none";
          else {
            label.element.style.display = "flex";
            label.element.style.left = `${x}px`;
            label.element.style.top = `${y}px`;
          }
        });
      }

      // ==========================================
      // Event Listener สำหรับ AI Smart Cleaning
      // ==========================================
      const btnOptimize = document.getElementById("btn-ai-optimize");
      const inputMess = document.getElementById("ai-mess-input");
      const resultDiv = document.getElementById("ai-smart-result");
      const smartLoader = document.getElementById("ai-smart-loader");

      btnOptimize.addEventListener("click", async () => {
        if (!inputMess.value) return;
        btnOptimize.disabled = true;
        smartLoader.style.display = "block";
        resultDiv.style.display = "none";

        try {
          const prompt = `สถานการณ์บนพื้น: ${inputMess.value}`;
          const data = normalizeCleaningSettings(await fetchGeminiJSON(prompt));

          targetBlowerSpeed = data.blowerSpeed;
          targetBrushSpeed = data.brushSpeed;
          isWaterPumpOn = data.waterPump;

          if (!isPowerOn) {
            btnPower.click();
          }

          resultDiv.innerHTML = `<strong>⚙️ อัปเดตตั้งค่า 3D เรียบร้อย!</strong><br>
                                       💨 พัดลม Blower: ${(data.blowerSpeed * 100).toFixed(0)}%<br>
                                       🧹 แปรงปัด: ${(data.brushSpeed * 100).toFixed(0)}%<br>
                                       💧 ปั๊มน้ำสเปรย์: ${data.waterPump ? '<span style="color:#2ed573">ทำงาน</span>' : '<span style="color:#ff4757">ปิด</span>'}<br>
                                       <br><span style="color:#a29bfe">💬 ${data.explanation}</span>`;
          resultDiv.innerHTML = resultDiv.innerHTML.replace(
            data.explanation,
            escapeHtml(data.explanation),
          );
          resultDiv.style.display = "block";
        } catch (err) {
          resultDiv.innerHTML =
            "⚠️ เกิดข้อผิดพลาดในการวิเคราะห์ กรุณาลองคำอื่น";
          resultDiv.innerHTML = `⚠️ เกิดข้อผิดพลาดในการวิเคราะห์<br><span style="color:#ffb3b3">${escapeHtml(
            formatErrorMessage(err, "กรุณาลองคำอื่น"),
          )}</span>`;
          resultDiv.style.display = "block";
        } finally {
          btnOptimize.disabled = false;
          smartLoader.style.display = "none";
        }
      });

      // --- 6. UI พื้นฐาน ---
      let isPowerOn = true;
      let isCoverVisible = true;
      let isLabelsVisible = true;
      let isBottomView = false;
      const btnPower = document.getElementById("btn-power");
      const btnCover = document.getElementById("btn-cover");
      const btnLabels = document.getElementById("btn-labels");
      const btnBottom = document.getElementById("btn-bottom");

      btnPower.addEventListener("click", () => {
        isPowerOn = !isPowerOn;
        btnPower.classList.toggle("active");
        btnPower.innerHTML = isPowerOn ? "⚡ Power (ON)" : "🔌 Power (OFF)";
        stateLEDs.forEach((led) => (led.light.intensity = isPowerOn ? 1 : 0));
        if (!isPowerOn)
          stateLEDs.forEach((led) => led.mat.color.setHex(0x111111));
        else {
          stateLEDs[0].mat.color.setHex(0xff0000);
          stateLEDs[1].mat.color.setHex(0x00ff00);
          stateLEDs[2].mat.color.setHex(0x0000ff);
        }
      });

      btnCover.addEventListener("click", () => {
        isCoverVisible = !isCoverVisible;
        btnCover.classList.toggle("active");
        cover.visible = isCoverVisible;
      });
      btnLabels.addEventListener("click", () => {
        isLabelsVisible = !isLabelsVisible;
        btnLabels.classList.toggle("active");
        labelsContainer.style.display = isLabelsVisible ? "block" : "none";
      });

      btnBottom.addEventListener("click", () => {
        isBottomView = !isBottomView;
        if (isBottomView) {
          camera.position.set(0, -5, -12);
          btnBottom.innerHTML = "🔄 กลับมุมมองด้านบน";
          btnBottom.style.background = "#00d2d3";
          btnBottom.style.color = "#111";
          controls.target.set(0, -1, -4.5);
        } else {
          camera.position.set(22, 18, 28);
          btnBottom.innerHTML = "🔍 ดูใต้ท้องเครื่อง";
          btnBottom.style.background = "#f0932b";
          btnBottom.style.color = "white";
          controls.target.set(0, 0, 0);
        }
        controls.update();
      });

      // --- 7. Animation Loop ---
      const clock = new THREE.Clock();
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        const time = clock.getElapsedTime();

        if (isPowerOn) {
          bL.rotation.y -= targetBrushSpeed;
          bR.rotation.y += targetBrushSpeed;
          fanBlades.rotation.y += targetBlowerSpeed;

          wheelL.rotation.x -= 0.05;
          wheelR.rotation.x -= 0.05;
          servoHorn.rotation.y = Math.sin(time * 2.5) * (Math.PI / 4);

          spraySystems.forEach((sys) => {
            sys.points.visible = isWaterPumpOn;
            if (isWaterPumpOn) {
              const positions = sys.points.geometry.attributes.position.array;
              for (let i = 0; i < positions.length / 3; i++) {
                sys.lifetimes[i] -= 0.03;
                if (sys.lifetimes[i] <= 0) {
                  positions[i * 3] = sys.baseX;
                  positions[i * 3 + 1] = sys.baseY;
                  positions[i * 3 + 2] = sys.baseZ;
                  sys.lifetimes[i] = 1.0;
                  sys.velocities[i].x = (Math.random() - 0.5) * 0.03;
                  sys.velocities[i].y = -0.04 - Math.random() * 0.02;
                  sys.velocities[i].z = (Math.random() - 0.5) * 0.03;
                } else {
                  positions[i * 3] += sys.velocities[i].x;
                  positions[i * 3 + 1] += sys.velocities[i].y;
                  positions[i * 3 + 2] += sys.velocities[i].z;
                }
              }
              sys.points.geometry.attributes.position.needsUpdate = true;
            }
          });

          if (Math.random() > 0.9)
            stateLEDs[0].light.intensity = Math.random() > 0.5 ? 1 : 0.2;
          if (Math.random() > 0.9)
            stateLEDs[1].light.intensity = Math.random() > 0.5 ? 1 : 0.2;
        } else {
          spraySystems.forEach((sys) => {
            sys.points.visible = false;
          });
        }

        updateLabels();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
